version: "3.9"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medicore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django API ──
  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=medicore.settings.production
      - DB_HOST=db
      - DB_NAME=medicore
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media

  # ── Celery Worker ──
  celery:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    command: celery -A medicore worker -l info --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=medicore.settings.production
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - api

  # ── Celery Beat ──
  celery-beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    command: celery -A medicore beat -l info
    environment:
      - DJANGO_SETTINGS_MODULE=medicore.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - api

  # ── Nginx ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - api

volumes:
  postgres_data:
  static_files:
  media_files:
